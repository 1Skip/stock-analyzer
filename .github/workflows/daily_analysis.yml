name: 飞书每日股票分析推送

on:
  schedule:
    # 北京时间 15:30，GitHub Actions 使用 UTC
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查飞书 Webhook Secret
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "::error::请先在 GitHub 仓库 Settings > Secrets and variables > Actions 中配置 FEISHU_WEBHOOK_URL"
            exit 1
          fi

      - name: 写入自选股 Secret
        env:
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
        run: |
          if [ -n "$WATCHLIST_JSON" ]; then
            python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          raw = os.environ.get("WATCHLIST_JSON", "").strip()
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::WATCHLIST_JSON 不是合法 JSON: {exc}")
              sys.exit(1)

          if not isinstance(data, list):
              print("::error::WATCHLIST_JSON 必须是数组，例如 [{\"symbol\":\"600519\",\"name\":\"贵州茅台\",\"market\":\"CN\"}]")
              sys.exit(1)

          normalized = []
          for index, item in enumerate(data, start=1):
              if not isinstance(item, dict):
                  print(f"::error::WATCHLIST_JSON 第 {index} 项必须是对象")
                  sys.exit(1)
              symbol = str(item.get("symbol", "")).strip()
              if not symbol:
                  print(f"::error::WATCHLIST_JSON 第 {index} 项缺少 symbol")
                  sys.exit(1)
              normalized.append({
                  "symbol": symbol,
                  "name": str(item.get("name") or symbol).strip(),
                  "market": str(item.get("market") or "CN").strip().upper(),
              })

          pathlib.Path("watchlist.json").write_text(
              json.dumps(normalized, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"已从 WATCHLIST_JSON 写入 {len(normalized)} 只自选股")
          PY
          else
            echo "未配置 WATCHLIST_JSON，本次日报自选股为空。"
            echo "[]" > watchlist.json
          fi

      - name: 运行定时分析并推送到飞书
        env:
          NOTIFY_CHANNELS: feishu
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DAILY_REPORT_ENABLED: "true"
          DAILY_REPORT_PUSH_ENABLED: "true"
          DAILY_REPORT_INCLUDE_RECOMMENDATIONS: "false"
          DAILY_REPORT_DIR: reports/history
        run: python main.py --notify

      - name: 上传日报产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-report
          path: reports/history/*.md
          if-no-files-found: ignore
