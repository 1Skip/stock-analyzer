name: 飞书每日股票分析推送

on:
  schedule:
    # 北京时间 15:30，GitHub Actions 使用 UTC
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查飞书 Webhook Secret
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "::error::请先在 GitHub 仓库 Settings > Secrets and variables > Actions 中配置 FEISHU_WEBHOOK_URL"
            exit 1
          fi

      - name: 写入自选股 Secret
        env:
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import sys

          from data_fetcher import StockDataFetcher
          from stock_names import CN_STOCK_NAMES_EXTENDED

          MARKET_ALIASES = {"A": "CN", "A股": "CN", "CN": "CN", "HK": "HK", "US": "US"}
          raw_json = os.environ.get("WATCHLIST_JSON", "").strip()
          stock_list = os.environ.get("STOCK_LIST", "").strip()
          fetcher = StockDataFetcher()
          data = []
          source = "empty"


          def item_from_text(text):
              token = str(text or "").strip()
              if not token:
                  return None

              market = "CN"
              upper = token.upper()
              if ":" in token:
                  prefix, value = token.split(":", 1)
                  if prefix.upper() in MARKET_ALIASES:
                      market = MARKET_ALIASES[prefix.upper()]
                      token = value.strip()
                      upper = token.upper()
              elif upper.startswith("HK") and len(upper) > 2:
                  market = "HK"
                  token = upper[2:].strip()
              elif upper.startswith("US") and len(upper) > 2:
                  market = "US"
                  token = upper[2:].strip()

              if not token:
                  return None

              if market == "CN":
                  for code, name in CN_STOCK_NAMES_EXTENDED.items():
                      if token == code or token == name:
                          return {"symbol": code, "name": name, "market": "CN"}
                  resolved = fetcher.resolve_stock_input(token, "CN")
                  if resolved:
                      symbol, name = resolved
                      return {"symbol": symbol, "name": name, "market": "CN"}
                  if re.search(r"[\u4e00-\u9fff]", token):
                      print(f"::error::STOCK_LIST 未识别 A股名称：{token}。请改用 6 位股票代码，或检查名称是否完整。")
                      sys.exit(1)

              return {
                  "symbol": token.upper() if market != "CN" else token,
                  "name": token,
                  "market": market,
              }


          if raw_json:
              try:
                  parsed = json.loads(raw_json)
              except json.JSONDecodeError as exc:
                  print(f"::error::WATCHLIST_JSON 不是合法 JSON: {exc}")
                  sys.exit(1)

              if not isinstance(parsed, list):
                  print("::error::WATCHLIST_JSON 必须是数组")
                  sys.exit(1)

              for index, item in enumerate(parsed, start=1):
                  if not isinstance(item, dict):
                      print(f"::error::WATCHLIST_JSON 第 {index} 项必须是对象")
                      sys.exit(1)
                  symbol = str(item.get("symbol", "")).strip()
                  if not symbol:
                      print(f"::error::WATCHLIST_JSON 第 {index} 项缺少 symbol")
                      sys.exit(1)
                  data.append({
                      "symbol": symbol,
                      "name": str(item.get("name") or symbol).strip(),
                      "market": str(item.get("market") or "CN").strip().upper(),
                  })
              source = "WATCHLIST_JSON"
          elif stock_list:
              for token in re.split(r"[,，\n]+", stock_list):
                  item = item_from_text(token)
                  if item:
                      data.append(item)
              source = "STOCK_LIST"

          pathlib.Path("watchlist.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          if data:
              print(f"已从 {source} 写入 {len(data)} 只自选股")
          else:
              print("未配置 WATCHLIST_JSON/STOCK_LIST，本次日报自选股为空。")
          PY

      - name: 运行定时分析并推送到飞书
        env:
          NOTIFY_CHANNELS: feishu
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DAILY_REPORT_ENABLED: "true"
          DAILY_REPORT_PUSH_ENABLED: "true"
          DAILY_REPORT_INCLUDE_RECOMMENDATIONS: "false"
          DAILY_REPORT_DIR: reports/history
        run: python main.py --notify

      - name: 上传日报产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-report
          path: reports/history/*.md
          if-no-files-found: ignore
