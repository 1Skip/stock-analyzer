name: 飞书每日股票分析推送

on:
  schedule:
    # 北京时间 15:30，GitHub Actions 使用 UTC
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查飞书 Webhook Secret
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "::error::请先在 GitHub 仓库 Settings > Secrets and variables > Actions 中配置 FEISHU_WEBHOOK_URL"
            exit 1
          fi

      - name: 运行定时分析并推送到飞书
        env:
          NOTIFY_CHANNELS: feishu
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DAILY_REPORT_ENABLED: "true"
          DAILY_REPORT_PUSH_ENABLED: "true"
          DAILY_REPORT_INCLUDE_RECOMMENDATIONS: "false"
          DAILY_REPORT_DIR: reports/history
        run: python main.py --notify

      - name: 上传日报产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-report
          path: reports/history/*.md
          if-no-files-found: ignore
